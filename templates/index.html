<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bug Fix Time Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }

    .navbar-brand span { color: #ffc107; }

    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-header {
      background: #fff;
      border-bottom: 2px solid #f0f0f0;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
    }

    .priority-btn {
      border-radius: 20px;
      font-size: 0.8rem;
      padding: 4px 14px;
    }
    .priority-btn.active { font-weight: 600; }

    .result-box {
      border-radius: 12px;
      padding: 28px;
      text-align: center;
    }
    .result-box.short { background: #d1fae5; border: 2px solid #6ee7b7; }
    .result-box.long  { background: #fee2e2; border: 2px solid #fca5a5; }

    .result-label {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .result-label.short { color: #065f46; }
    .result-label.long  { color: #991b1b; }

    .confidence-bar .progress { height: 8px; border-radius: 4px; }

    .feature-table td { font-size: 0.85rem; }
    .feature-table td:first-child { color: #6c757d; font-family: monospace; }
    .feature-table td:last-child { font-weight: 500; }

    .status-badge { font-size: 0.75rem; }

    #empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #adb5bd;
    }
    #empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1">
      <i class="bi bi-bug-fill me-2"></i>Bug Fix Time <span>Predictor</span>
    </span>
    <span id="api-badge" class="badge bg-secondary status-badge">
      <i class="bi bi-circle-fill me-1"></i>Checking API...
    </span>
  </div>
</nav>

<div class="container pb-5">
  <div class="row g-4">

    <!-- Input Form -->
    <div class="col-lg-6">
      <div class="card h-100">
        <div class="card-header py-3">
          <i class="bi bi-pencil-square me-2"></i>Bug Details
        </div>
        <div class="card-body p-4">

          <div class="mb-3">
            <label class="form-label">Summary <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="summary"
              placeholder="e.g. NPE in TaskScheduler when queue is empty"/>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3"
              placeholder="Detailed description of the bug..."></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Priority</label>
            <div class="d-flex flex-wrap gap-2" id="priority-group">
              <button class="btn btn-sm btn-outline-danger priority-btn"   data-val="Blocker">Blocker</button>
              <button class="btn btn-sm btn-outline-warning priority-btn"  data-val="Critical">Critical</button>
              <button class="btn btn-sm btn-outline-primary priority-btn active" data-val="Major">Major</button>
              <button class="btn btn-sm btn-outline-secondary priority-btn" data-val="Minor">Minor</button>
              <button class="btn btn-sm btn-outline-secondary priority-btn" data-val="Trivial">Trivial</button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Components</label>
            <input type="text" class="form-control" id="components"
              placeholder="e.g. Scheduler, Core, API"/>
            <div class="form-text">Comma-separated list</div>
          </div>

          <div class="mb-4">
            <label class="form-label">Created Date</label>
            <input type="datetime-local" class="form-control" id="created_date"/>
          </div>

          <button class="btn btn-warning w-100 fw-semibold" id="predict-btn" onclick="runPredict()">
            <i class="bi bi-lightning-fill me-2"></i>Run Prediction
          </button>

          <div id="error-msg" class="alert alert-danger mt-3 d-none" role="alert"></div>

        </div>
      </div>
    </div>

    <!-- Result Panel -->
    <div class="col-lg-6">
      <div class="card h-100">
        <div class="card-header py-3">
          <i class="bi bi-bar-chart-fill me-2"></i>Prediction Result
        </div>
        <div class="card-body p-4">

          <div id="empty-state">
            <i class="bi bi-hourglass"></i>
            <p class="mb-0">Fill in the bug details<br/>and run a prediction.</p>
          </div>

          <div id="result-content" class="d-none">

            <!-- Result box -->
            <div id="result-box" class="result-box mb-4">
              <div id="result-label" class="result-label"></div>
              <div class="text-muted" style="font-size:0.85rem;">Resolution time estimate</div>
            </div>

            <!-- Confidence -->
            <div class="confidence-bar mb-4">
              <div class="d-flex justify-content-between mb-1">
                <small class="text-muted">Confidence (short fix)</small>
                <small class="fw-semibold" id="conf-pct">0%</small>
              </div>
              <div class="progress">
                <div id="conf-fill" class="progress-bar" role="progressbar" style="width:0%"></div>
              </div>
            </div>

            <!-- Feature breakdown -->
            <div class="card border">
              <div class="card-header py-2" style="font-size:0.78rem;">
                <i class="bi bi-table me-1"></i>Input Features Sent to Model
              </div>
              <div class="card-body p-0">
                <table class="table table-sm table-hover feature-table mb-0">
                  <tbody id="feature-rows"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let selectedPriority = 'Major';

  // Set default datetime
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('created_date').value = now.toISOString().slice(0, 16);

  // Priority pills
  document.getElementById('priority-group').addEventListener('click', e => {
    const btn = e.target.closest('.priority-btn');
    if (!btn) return;
    document.querySelectorAll('.priority-btn').forEach(b => {
      b.classList.remove('active');
      // reset to outline style
      b.className = b.className.replace('btn-danger','btn-outline-danger')
                               .replace('btn-warning','btn-outline-warning')
                               .replace('btn-primary','btn-outline-primary')
                               .replace(/btn-secondary(?!.*outline)/,'btn-outline-secondary');
    });
    btn.classList.add('active');
    selectedPriority = btn.dataset.val;
  });

  // Health check
  async function checkHealth() {
    const badge = document.getElementById('api-badge');
    try {
      const res = await fetch('/health');
      const d = await res.json();
      if (d.model_loaded) {
        badge.className = 'badge bg-success status-badge';
        badge.innerHTML = '<i class="bi bi-circle-fill me-1"></i>API Online';
      } else {
        badge.className = 'badge bg-warning text-dark status-badge';
        badge.innerHTML = '<i class="bi bi-circle-fill me-1"></i>Model Not Loaded';
      }
    } catch {
      badge.className = 'badge bg-danger status-badge';
      badge.innerHTML = '<i class="bi bi-circle-fill me-1"></i>API Offline';
    }
  }
  checkHealth();

  async function runPredict() {
    const summary = document.getElementById('summary').value.trim();
    const errorDiv = document.getElementById('error-msg');
    errorDiv.classList.add('d-none');

    if (!summary) {
      errorDiv.textContent = 'Summary is required.';
      errorDiv.classList.remove('d-none');
      return;
    }

    const btn = document.getElementById('predict-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Predicting...';

    const payload = {
      summary,
      description: document.getElementById('description').value.trim(),
      priority: selectedPriority,
      components: document.getElementById('components').value.trim(),
      created_date: document.getElementById('created_date').value + ':00'
    };

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);

      showResult(data, payload);
    } catch (e) {
      errorDiv.textContent = 'Error: ' + e.message;
      errorDiv.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-lightning-fill me-2"></i>Run Prediction';
    }
  }

  function showResult(data, payload) {
    const isShort = data.label === 1;
    const confPct = Math.round(data.confidence * 100);

    document.getElementById('empty-state').classList.add('d-none');
    document.getElementById('result-content').classList.remove('d-none');

    const box = document.getElementById('result-box');
    box.className = 'result-box mb-4 ' + (isShort ? 'short' : 'long');

  

    const label = document.getElementById('result-label');
    label.textContent = data.prediction;
    label.className = 'result-label ' + (isShort ? 'short' : 'long');

    document.getElementById('conf-pct').textContent = confPct + '%';
    const fill = document.getElementById('conf-fill');
    fill.className = 'progress-bar ' + (isShort ? 'bg-success' : 'bg-danger');
    setTimeout(() => { fill.style.width = confPct + '%'; }, 50);

    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const createdDate = new Date(payload.created_date);
    const nComp = payload.components
      ? payload.components.split(',').filter(s => s.trim()).length : 0;

    const rows = [
      ['priority',      payload.priority],
      ['summary_len',   payload.summary.length + ' chars'],
      ['desc_len',      payload.description.length + ' chars'],
      ['n_components',  nComp],
      ['created_dow',   days[createdDate.getDay()]],
      ['created_hour',  createdDate.getHours() + ':00'],
      ['created_month', createdDate.toLocaleString('default', {month:'short'})],
    ];

    document.getElementById('feature-rows').innerHTML = rows.map(([k, v]) =>
      `<tr><td class="ps-3">${k}</td><td class="pe-3 text-end">${v}</td></tr>`
    ).join('');
  }
</script>
</body>
</html>
